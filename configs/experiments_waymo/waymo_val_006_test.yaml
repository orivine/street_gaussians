task: waymo_exp_abcd1_ablation
source_path: ./data/waymo/validation/006
exp_name: waymo_val_006

to_cuda: true
gpus: [0]

data:
  split_train: -1
  split_test: 4
  type: Waymo
  white_background: true
  selected_frames: [0, 85]
  cameras: [0]
  use_tracker: true
  extent: 20
  use_colmap: true

model:
  gaussian:
    sh_degree: 1
    fourier_dim: 5
    fourier_scale: 1.
  nsg:
    include_bkgd: true
    include_obj: true
    include_sky: false
    opt_track: true

train:
  iterations: 30000
  test_iterations: [7000, 30000]
  checkpoint_iterations: [30000]

optim:
  prune_box_interval: 100
  densification_interval: 100
  densify_from_iter: 500
  densify_grad_threshold: 0.0002
  densify_until_iter: 15000
  feature_lr: 0.0025
  max_screen_size: 20
  min_opacity: 0.005
  opacity_lr: 0.05
  opacity_reset_interval: 3000
  percent_big_ws: 0.1
  percent_dense: 0.01
  position_lr_delay_mult: 0.01
  position_lr_final: 1.6e-06
  position_lr_init: 0.00016
  position_lr_max_steps: 30000
  rotation_lr: 0.001
  scaling_lr: 0.005
  semantic_lr: 0.01

  lambda_dssim: 0.2
  lambda_mask: 0.1
  lambda_reg: 0.1
  lambda_depth_lidar: 0.
  lambda_l1: 3.

  track_position_lr_delay_mult: 0.01
  track_position_lr_init: 0.005
  track_position_lr_final: 5.0e-5
  track_position_max_steps: 30000

  track_rotation_lr_delay_mult: 0.01
  track_rotation_lr_init: 0.001
  track_rotation_lr_final: 1.0e-5
  track_rotation_max_steps: 30000

render:
  fps: 30

method:
  priority:
    source: none          # none | box | box_residual
    dilate: 0
    residual_scope: 'box' # choices: box, global
    residual_lambda: 1.0
    residual_blend: 0.5
    residual_norm: 'percentile' # choices: percentile
    residual_ema: false
    residual_ema_decay: 0.9

  photo_loss:
    mode: baseline    # baseline | priority_l1
    lambda_p: 0.5
    warmup_start: 2000
    warmup_end: 8000

  sampler:
    mode: uniform   # uniform | priority_mix
    eta: 0.2
    score_type: box_area # box_area | box_mass | object_count
    score_source: 'box' # choices: box

  density:
    mode: baseline         # baseline | object | gaussian
    obj_densify_scale: 0.8
    obj_prune_scale: 0.8
    bg_densify_scale: 1.0
    bg_prune_scale: 1.0
    alpha: 0.4

  regularization:
    bg_penalty_enabled: false
    lambda_bg_penalty: 0.0